name: Windows Build CI

on:
  workflow_dispatch:
    inputs:
      chromium_url:
        description: 'Direct download URL for Chromium Windows zip (leave empty to skip bundling)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: src/web
        run: |
          pnpm install
          pnpm build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Build Windows binary
        working-directory: src
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o manager.exe .

      - name: Download Chromium Windows binary
        if: inputs.chromium_url != ''
        run: |
          mkdir -p chromium-tmp
          curl -L -o chromium-tmp/chromium-windows.zip "${{ inputs.chromium_url }}"

      - name: Assemble package
        run: |
          PKG=dist/chromium-manager-windows
          mkdir -p "$PKG/bin/chromium" "$PKG/data"

          cp src/manager.exe "$PKG/"

          cat > "$PKG/start.bat" << 'EOF'
          @echo off
          start http://127.0.0.1:10101
          manager.exe
          pause
          EOF

          if [ -f chromium-tmp/chromium-windows.zip ]; then
            unzip -q chromium-tmp/chromium-windows.zip -d "$PKG/bin/chromium/"
          fi

          cd dist
          zip -r chromium-manager-windows.zip chromium-manager-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-manager-windows
          path: dist/chromium-manager-windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chromium-manager-windows.zip
