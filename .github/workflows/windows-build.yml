name: Windows Build CI

on:
  workflow_dispatch:
    inputs:
      chromium_tag:
        description: 'Chromium release tag (leave empty to use current ref)'
        required: false
        default: ''
      include_chromium:
        description: 'Bundle Chromium binary in zip'
        type: boolean
        required: false
        default: true

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: src/web
        run: |
          pnpm install
          pnpm build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Build Windows binary
        working-directory: src
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o manager.exe .

      - name: Determine Chromium tag
        if: inputs.include_chromium
        id: tag
        run: |
          TAG="${{ inputs.chromium_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download Chromium Windows binary
        if: inputs.include_chromium
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          fileName: 'ungoogled-chromium-*_windows.zip'
          out-file-path: chromium-tmp

      - name: Assemble package
        run: |
          PKG=dist/chromium-manager-windows
          mkdir -p "$PKG/bin/chromium" "$PKG/data"

          cp src/manager.exe "$PKG/"

          cat > "$PKG/start.bat" << 'EOF'
          @echo off
          start http://127.0.0.1:10101
          manager.exe
          pause
          EOF

          if [ "${{ inputs.include_chromium }}" = "true" ]; then
            ZIPFILE=$(ls chromium-tmp/ungoogled-chromium-*_windows.zip 2>/dev/null | head -1)
            if [ -n "$ZIPFILE" ]; then
              unzip -q "$ZIPFILE" -d "$PKG/bin/chromium/"
            fi
          fi

          cd dist
          zip -r chromium-manager-windows.zip chromium-manager-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-manager-windows
          path: dist/chromium-manager-windows.zip
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chromium-manager-windows.zip
